name: condtional # name of the workflow 

# This defines the event that triggers the workflow
on: [push] # triggeres 

jobs:
  say-conditions:
    # The type of virtual machine the job will run on
    runs-on: ubuntu-latest

    steps:
      # Step 1: Print the classic message in the logs
      - name: Run Hello World
        if: github.ref_name == 'main'
        run: echo "Hello, World! from main "
      
      - name: Run Hello World
        if: github.ref_name == 'feature-*'
        run: echo "Hello, World! from feature "