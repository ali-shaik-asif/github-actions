name: work flow # name of the workflow 

# This defines the event that triggers the workflow
on: [push] # triggeres 
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  options:
    # The type of virtual machine the job will run on
    runs-on: ubuntu-latest

    steps:
      # Step 1: Print the classic message in the logs
      - name: Run Hello World
        run: sleep 60

